<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Geometry Dash Web</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <style>
    @font-face {
      font-family: 'Pusab';
      src: url('font/pusab.woff2') format('woff2');
    }

    :root {
      --bg-blue: #2854cf;
      --bg-blue-dark: #112661;
      --panel-brown: #bc6d3d;
      --panel-brown-dark: #a1582c;
      --every-end-blue: #050a1a; 
      --gd-text-stroke: 1.5px black;
      --gd-text-shadow: 3px 3px 0px rgba(0,0,0,1);
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: transparent;
      color: white;
      font-family: 'Pusab', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      user-select: none;
    }

    /* Shift background color dynamically */
    .bg-gradient {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: radial-gradient(circle, var(--bg-blue) 0%, var(--bg-blue-dark) 100%);
      z-index: -2;
      animation: gd-bg-shift 25s infinite linear;
    }

    @keyframes gd-bg-shift {
      0% { filter: hue-rotate(0deg); }
      100% { filter: hue-rotate(360deg); }
    }

    #file-warning-bar {
      display: none;
      width: 100%;
      background: #d9534f;
      color: white;
      text-align: center;
      padding: 10px 15px;
      font-family: sans-serif;
      font-weight: bold;
      font-size: 14px;
      box-sizing: border-box;
      z-index: 1000;
      position: absolute;
      top: 0;
      left: 0;
      border-bottom: 3px solid black;
      text-shadow: 1px 1px 0px black;
    }

    #particle-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -1;
      pointer-events: none;
    }

    /* Player Profile Panel */
    .profile-card {
      position: absolute;
      top: 20px;
      left: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(0, 0, 0, 0.75);
      border: 3px solid white;
      border-radius: 8px;
      padding: 8px 14px;
      z-index: 100;
      font-family: 'Pusab', sans-serif;
      font-size: 11px;
      color: white;
      -webkit-text-stroke: 0.5px black;
      text-shadow: 1px 1px 0px black;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }
    .avatar-container {
      width: 38px;
      height: 38px;
      flex-shrink: 0;
      background: rgba(255,255,255,0.1);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.1s;
      cursor: pointer;
    }
    .avatar-container:hover {
      transform: scale(1.1) rotate(5deg);
    }
    .gd-avatar {
      width: 100%;
      height: 100%;
    }
    .profile-stats {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .stat-item {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .stat-icon {
      font-size: 11px;
      -webkit-text-stroke: 0px;
      text-shadow: none;
    }

    .audio-control {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(0, 0, 0, 0.7);
      border: 3px solid white;
      border-radius: 50%;
      width: 45px;
      height: 45px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: white;
      font-size: 20px;
      z-index: 100;
      transition: transform 0.1s;
    }
    .audio-control:hover {
      transform: scale(1.1);
    }

    nav {
      position: absolute;
      top: 20px;
      display: flex;
      gap: 15px;
      z-index: 100;
    }

    .tab-btn {
      background: rgba(0, 0, 0, 0.7);
      border: 3px solid white;
      color: white;
      font-family: 'Pusab', sans-serif;
      font-size: 14px;
      padding: 8px 25px;
      cursor: pointer;
      border-radius: 4px;
      -webkit-text-stroke: 1px black;
      text-shadow: 2px 2px 0px black;
    }

    .tab-btn.active { background: #ffaa00; }

    /* Controls Bar for Levels Search/Filter */
    .controls-container {
      display: flex;
      gap: 15px;
      margin-bottom: 12px;
      width: 90vw;
      max-width: 950px;
      z-index: 100;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      transition: opacity 0.2s;
    }
    .search-input {
      background: rgba(0, 0, 0, 0.6);
      border: 3px solid #bc6d3d;
      border-radius: 6px;
      color: white;
      font-family: 'Pusab', sans-serif;
      font-size: 12px;
      padding: 8px 12px;
      width: 200px;
      outline: none;
      -webkit-text-stroke: 0.5px black;
      text-shadow: 1px 1px 0px black;
    }
    .search-input:focus {
      border-color: #fdc416;
    }
    .filters-group {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .filter-btn {
      background: rgba(0, 0, 0, 0.6);
      border: 2px solid white;
      color: white;
      font-family: 'Pusab', sans-serif;
      font-size: 10px;
      padding: 6px 12px;
      cursor: pointer;
      border-radius: 4px;
      text-transform: uppercase;
      -webkit-text-stroke: 0.5px black;
      text-shadow: 1px 1px 0px black;
      transition: transform 0.1s;
    }
    .filter-btn:hover {
      transform: scale(1.05);
    }
    .filter-btn.active {
      background: #fdc416;
      border-color: #ff5500;
      color: white;
    }

    .game-window {
      position: relative;
      width: 90vw;
      max-width: 950px;
      aspect-ratio: 16 / 9;
    }

    .content-viewport {
      position: absolute;
      top: 6.5%; 
      left: 5%;
      right: 5%;
      bottom: 8.5%;
      z-index: 1; 
      background: #8e4f2b; 
      overflow: hidden;
      scrollbar-width: none;
      display: none; 
    }

    .content-viewport.active { display: flex; flex-direction: column; }
    .content-viewport::-webkit-scrollbar { display: none; }

    .hub-frame-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('img/Hubv2.png');
      background-size: 100% 100%;
      z-index: 10;
      pointer-events: none;
    }

    .level-item {
      height: 33.33%; 
      flex-shrink: 0;
      background: var(--panel-brown);
      display: flex;
      align-items: center;
      padding: 0 30px;
      border-bottom: 2.5px solid rgba(0,0,0,0.3);
      box-sizing: border-box;
    }

    .level-item:nth-child(even) { background: var(--panel-brown-dark); }
    .import-style { background: #468d49 !important; }
    .every-end-style { background: var(--every-end-blue) !important; border-bottom: 2.5px solid #000 !important; }

    .difficulty-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 80px;
      margin-right: 20px;
    }

    .difficulty-face {
      width: 55px;
      height: auto;
    }

    .difficulty-label {
      font-size: 10px;
      margin-top: 4px;
      text-transform: uppercase;
      -webkit-text-stroke: 1px black;
      text-shadow: 1px 1px 0px black;
    }

    .level-main-info {
      flex-grow: 1;
      display: flex;
      flex-direction: column;
    }

    .level-name {
      font-size: 26px;
      margin: 0;
      text-transform: uppercase;
      -webkit-text-stroke: var(--gd-text-stroke);
      text-shadow: var(--gd-text-shadow);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 320px;
    }

    .level-creator {
      font-size: 16px;
      color: #fdc416;
      -webkit-text-stroke: var(--gd-text-stroke);
      text-shadow: var(--gd-text-shadow);
      margin-top: 3px;
    }

    /* Meta buttons (Fav and Complete) inside rows */
    .level-meta-buttons {
      display: flex;
      gap: 10px;
      margin-right: 20px;
    }
    .meta-btn {
      background: rgba(0, 0, 0, 0.4);
      border: 2px solid rgba(255, 255, 255, 0.4);
      border-radius: 6px;
      color: rgba(255, 255, 255, 0.6);
      font-size: 14px;
      width: 34px;
      height: 34px;
      cursor: pointer;
      transition: all 0.1s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      outline: none;
    }
    .meta-btn:hover {
      transform: scale(1.1);
      border-color: white;
      color: white;
    }
    .fav-btn.active {
      background: rgba(233, 30, 99, 0.15);
      border-color: #e91e63;
      color: #e91e63;
      text-shadow: 0 0 5px rgba(233, 30, 99, 0.5);
    }
    .comp-btn.active {
      background: rgba(253, 196, 22, 0.15);
      border-color: #fdc416;
      color: #fdc416;
      text-shadow: 0 0 5px rgba(253, 196, 22, 0.5);
    }

    .play-btn {
      width: 105px;
      cursor: pointer;
      pointer-events: auto;
      transition: transform 0.1s;
    }
    .play-btn:hover { transform: scale(1.05); }

    .nav-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 75px;
      cursor: pointer;
      z-index: 20;
    }

    #prev-btn { left: -90px; transform: translateY(-50%) scaleX(-1); }
    #next-btn { right: -90px; }

    .page-indicator {
      position: absolute;
      bottom: -35px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 20px;
      -webkit-text-stroke: 1px black;
      text-shadow: 2px 2px 0px black;
    }

    /* Custom GD Modal */
    .gd-modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.85);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease-in-out;
    }
    .gd-modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }
    .gd-modal-panel {
      background: #8e4f2b;
      border: 5px solid #fdc416;
      box-shadow: 0px 0px 20px rgba(0,0,0,0.8);
      border-radius: 12px;
      width: 90%;
      max-width: 450px;
      padding: 25px;
      box-sizing: border-box;
      text-align: center;
      transform: scale(0.7);
      transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      position: relative;
    }
    .gd-modal-overlay.active .gd-modal-panel {
      transform: scale(1);
    }
    .gd-modal-title {
      font-size: 24px;
      margin-top: 0;
      margin-bottom: 20px;
      color: white;
      text-transform: uppercase;
      -webkit-text-stroke: var(--gd-text-stroke);
      text-shadow: var(--gd-text-shadow);
    }
    .gd-modal-input {
      background: rgba(0, 0, 0, 0.5);
      border: 3px solid #bc6d3d;
      border-radius: 6px;
      padding: 10px;
      color: white;
      font-family: 'Pusab', sans-serif;
      font-size: 16px;
      width: 80%;
      margin-bottom: 20px;
      outline: none;
      text-align: center;
    }
    .gd-modal-input:focus {
      border-color: #fdc416;
    }
    .gd-modal-buttons {
      display: flex;
      justify-content: center;
      gap: 15px;
    }
    .gd-btn {
      font-family: 'Pusab', sans-serif;
      font-size: 14px;
      padding: 10px 25px;
      border-radius: 6px;
      cursor: pointer;
      -webkit-text-stroke: 1px black;
      text-shadow: 1.5px 1.5px 0px black;
      border: 3px solid white;
      transition: transform 0.1s;
    }
    .gd-btn:hover {
      transform: scale(1.05);
    }
    .gd-btn-green {
      background: #468d49;
      color: white;
    }
    .gd-btn-red {
      background: #d9534f;
      color: white;
    }

    /* WBDL CSS */
    .wbdl-loading {
      text-align: center;
      font-size: 18px;
      padding: 40px;
      color: #fdc416;
      -webkit-text-stroke: 0.5px black;
      text-shadow: 1px 1px 0px black;
    }
    .demon-rank {
      font-size: 28px;
      font-weight: bold;
      color: #00ff44;
      min-width: 70px;
      text-align: center;
      -webkit-text-stroke: 1.5px black;
      text-shadow: 2px 2px 0px black;
      margin-right: 10px;
    }
    .demon-rank.top3 {
      color: #fdc416;
      text-shadow: 2px 2px 0px black, 0 0 10px rgba(253, 196, 22, 0.5);
    }
    .demon-actions {
      display: flex;
      gap: 15px;
      align-items: center;
    }
    .showcase-btn {
      width: 45px;
      height: 45px;
      cursor: pointer;
      transition: transform 0.1s;
    }
    .showcase-btn:hover {
      transform: scale(1.15);
    }

    /* Level Progress bar styles */
    .level-progress-container {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 5px;
      width: 100%;
      max-width: 250px;
    }
    .level-progress-bar {
      flex-grow: 1;
      height: 12px;
      background: rgba(0, 0, 0, 0.5);
      border: 1.5px solid rgba(255, 255, 255, 0.3);
      border-radius: 6px;
      overflow: hidden;
      position: relative;
    }
    .level-progress-fill {
      height: 100%;
      background: #2ece63;
      box-shadow: 0 0 5px rgba(46, 206, 99, 0.5);
    }
    .level-progress-text {
      font-size: 14px;
      color: #2ece63;
      -webkit-text-stroke: 1px black;
      text-shadow: 1px 1px 0px black;
      font-family: 'Pusab', sans-serif;
    }
  </style>
</head>

<body>
  <!-- Dynamic Background Shifter -->
  <div class="bg-gradient"></div>

  <!-- Warning Bar for file:// protocol -->
  <div id="file-warning-bar">
    ⚠️ Estás abriendo el juego desde un archivo local (file://). Los niveles NO funcionarán. Por favor, ejecuta un servidor local (ej. Live Server o npx http-server).
  </div>

  <!-- Particle Background Canvas -->
  <canvas id="particle-canvas"></canvas>

  <!-- Player Profile stats card -->
  <div class="profile-card">
    <div class="avatar-container" onclick="playSFX()" title="¡Avatar de Geometry Dash!">
      <svg class="gd-avatar" viewBox="0 0 100 100">
        <rect x="15" y="15" width="70" height="70" fill="#2ece63" stroke="black" stroke-width="6" rx="4"/>
        <rect x="25" y="30" width="16" height="16" fill="yellow" stroke="black" stroke-width="4" rx="2"/>
        <rect x="59" y="30" width="16" height="16" fill="yellow" stroke="black" stroke-width="4" rx="2"/>
        <path d="M 30 65 Q 50 80 70 65" fill="none" stroke="black" stroke-width="6" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="profile-stats">
      <div class="stat-item" title="Niveles Completados"><span class="stat-icon">🏆</span> <span id="stats-completed">0</span></div>
      <div class="stat-item" title="Demons Superados"><span class="stat-icon">👹</span> <span id="stats-demons">0</span></div>
      <div class="stat-item" title="Favoritos"><span class="stat-icon">❤️</span> <span id="stats-favs">0</span></div>
    </div>
  </div>

  <!-- Mute/Unmute audio button -->
  <div id="audio-btn" class="audio-control" onclick="toggleMute()" title="Activar/Silenciar Música">
    🔇
  </div>

  <nav>
    <button id="tab-levels" class="tab-btn active" onclick="openTab('levels')">LEVELS</button>
    <button id="tab-demonlist" class="tab-btn" onclick="openTab('demonlist')">WBDL</button>
  </nav>

  <!-- Search & Filter Controls -->
  <div class="controls-container">
    <input type="text" id="search-bar" class="search-input" placeholder="Buscar nivel..." oninput="handleSearch(event)">
    <div class="filters-group">
      <button class="filter-btn active" onclick="filterDifficulty('all', this)">Todos</button>
      <button class="filter-btn" onclick="filterDifficulty('Easy', this)">Fácil</button>
      <button class="filter-btn" onclick="filterDifficulty('Normal', this)">Normal</button>
      <button class="filter-btn" onclick="filterDifficulty('Hard', this)">Hard</button>
      <button class="filter-btn" onclick="filterDifficulty('Harder', this)">Harder</button>
      <button class="filter-btn" onclick="filterDifficulty('Insane', this)">Insane</button>
      <button class="filter-btn" onclick="filterDifficulty('Demon', this)">Demon</button>
      <button class="filter-btn" onclick="filterDifficulty('favorites', this)" style="border-color: #e91e63;">❤️ Favs</button>
    </div>
  </div>

  <div class="game-window">
    <div class="page-indicator" id="page-text">PAGE 1</div>
    <div class="hub-frame-overlay"></div>

    <img src="img/Next.png" id="prev-btn" class="nav-arrow" onclick="changePage(-1)">
    <img src="img/Next.png" id="next-btn" class="nav-arrow" onclick="changePage(1)">

    <div id="level-list" class="content-viewport active"></div>

    <div id="demonlist-content" class="content-viewport"></div>
  </div>

  <!-- Custom GD Import Level Modal -->
  <div id="custom-level-modal" class="gd-modal-overlay" onclick="closeCustomLevelModal(event)">
    <div class="gd-modal-panel" onclick="event.stopPropagation()">
      <h3 class="gd-modal-title">Cargar Nivel</h3>
      <p style="color: #fdc416; font-size: 12px; margin-bottom: 15px; -webkit-text-stroke: 0.5px black; text-shadow: 1px 1px 0px black;">INGRESA EL ID DE UN NIVEL DE GEOMETRY DASH:</p>
      <input type="text" id="level-id-input" class="gd-modal-input" placeholder="Ej. 10565740" onkeypress="handleModalKey(event)">
      <div class="gd-modal-buttons">
        <button class="gd-btn gd-btn-green" onclick="submitCustomLevel()">JUGAR</button>
        <button class="gd-btn gd-btn-red" onclick="closeCustomLevelModal()">CERRAR</button>
      </div>
    </div>
  </div>

  <script>
    const faces = {
      easy: "img/Easy.webp",
      normal: "img/Normal.webp",
      hard: "img/Hard.webp",
      harder: "img/Harder.webp",
      insane: "img/Insane.webp",
      easyDemon: "img/EasyDemon.webp",
      extremeDemon: "img/ExtremeDemon.webp"
    };

    const levels = [
      { name: "Import Level", creator: "Custom ID", id: "custom", style: "import-style", face: faces.normal, diff: "NA" },
      { name: "Stereo Madness", creator: "RobTop", id: "-1", face: faces.easy, diff: "Easy" },
      { name: "Back on Track", creator: "RobTop", id: "-2", face: faces.easy, diff: "Easy" },
      { name: "Polargeist", creator: "RobTop", id: "-3", face: faces.normal, diff: "Normal" },
      { name: "Dry Out", creator: "RobTop", id: "-4", face: faces.normal, diff: "Normal" },
      { name: "Base after Base", creator: "RobTop", id: "-5", face: faces.hard, diff: "Hard" },
      { name: "Cant Let Go", creator: "RobTop", id: "-6", face: faces.hard, diff: "Hard" },
      { name: "Jumper", creator: "RobTop", id: "-7", face: faces.harder, diff: "Harder" },
      { name: "Time Machine", creator: "RobTop", id: "-8", face: faces.harder, diff: "Harder" },
      { name: "Cycles", creator: "RobTop", id: "-9", face: faces.harder, diff: "Harder" },
      { name: "xStep", creator: "RobTop", id: "-10", face: faces.insane, diff: "Insane" },
      { name: "Clutterfunk", creator: "RobTop", id: "-11", face: faces.insane, diff: "Insane" },
      { name: "Theory of Everything", creator: "RobTop", id: "-12", face: faces.insane, diff: "Insane" },
      { name: "Electroman Adventures", creator: "RobTop", id: "-13", face: faces.insane, diff: "Insane" },
      { name: "Clubstep", creator: "RobTop", id: "-14", face: faces.easyDemon, diff: "Demon" },
      { name: "Electrodynamix", creator: "RobTop", id: "-15", face: faces.insane, diff: "Insane" },
      { name: "Hexagon Force", creator: "RobTop", id: "-16", face: faces.insane, diff: "Insane" },
      { name: "Blast Processing", creator: "RobTop", id: "-17", face: faces.harder, diff: "Harder" },
      { name: "Theory of Everything 2", creator: "RobTop", id: "-18", face: faces.easyDemon, diff: "Demon" },
      { name: "Geometrical Dominator", creator: "RobTop", id: "-19", face: faces.harder, diff: "Harder" },
      { name: "Deadlocked", creator: "RobTop", id: "-20", face: faces.easyDemon, diff: "Demon" },
      { name: "Fingerdash", creator: "RobTop", id: "-21", face: faces.insane, diff: "Insane" },
      { name: "Dash", creator: "RobTop", id: "-22", face: faces.insane, diff: "Insane" },
      { name: "Every End", creator: "MindCap", id: "-23", style: "every-end-style", face: faces.extremeDemon, diff: "Extreme" },
      { name: "Ultiate Destruction", creator: "RobTop", id: "-24", face: faces.hard, diff: "Hard" },
      
      // Curated Custom Community Levels (positive IDs)
      { name: "ReTray", creator: "Dioli", id: "11356877", face: faces.easy, diff: "Easy" },
      { name: "Sonar", creator: "JerkRat", id: "4454123", face: faces.easy, diff: "Easy" },
      { name: "The Nightmare", creator: "Jax", id: "13519", face: faces.easyDemon, diff: "Demon" },
      { name: "The Lightning Road", creator: "timeless real", id: "55520", face: faces.easyDemon, diff: "Demon" },
      { name: "Decode", creator: "Rek3dge", id: "2905391", face: faces.easyDemon, diff: "Demon" },
      { name: "B", creator: "Motleyorc", id: "34161749", face: faces.easyDemon, diff: "Demon" },
      { name: "Bloodbath", creator: "Riot", id: "10565740", face: faces.extremeDemon, diff: "Extreme" },
      { name: "Sonic Wave", creator: "lSunix", id: "62030588", face: faces.extremeDemon, diff: "Extreme" },
      { name: "Limbo", creator: "MindCap", id: "85655755", face: faces.extremeDemon, diff: "Extreme" },
      { name: "Tidal Wave", creator: "OniLink", id: "95574343", face: faces.extremeDemon, diff: "Extreme" }
    ];

    const fallbackWbdl = [
      { name: "Sovereign", author: "touchless", position: 1, level_id: "138483770", requirement: 24, showcase_link: "https://www.youtube.com/watch?v=HnBiO5-9MWg" },
      { name: "StaleWBDL", author: "megoodatgd", position: 2, level_id: "140014924", requirement: 41, showcase_link: "https://www.youtube.com/watch?v=Ss0ZgjHecbw" },
      { name: "Sky Realm", author: "TheRealDarnoc", position: 3, level_id: "214523", requirement: 46, showcase_link: "https://youtu.be/0dElwWNkK8w" },
      { name: "WBDL spam for fun", author: "RadicalRadium", position: 4, level_id: "140736422", requirement: 36, showcase_link: "https://www.youtube.com/watch?v=9Yo86RaDsiI" },
      { name: "Electrodynamix v2", author: "IIINePtunEIII", position: 5, level_id: "839175", requirement: 41, showcase_link: "https://youtu.be/cfWNJW0B70c" },
      { name: "Invisible Door", author: "kjson", position: 6, level_id: "138529272", requirement: 43, showcase_link: "https://www.youtube.com/watch?v=zEU0IpFV3BE" },
      { name: "move trigger slop", author: "grandparent", position: 7, level_id: "139243483", requirement: 57, showcase_link: "https://youtu.be/fn0zO3mNfhQ" },
      { name: "dorabaedifficult2", author: "DORABAE", position: 8, level_id: "1567615", requirement: 49, showcase_link: "https://youtu.be/phrTMm7Uw64" },
      { name: "Clubstep v2", author: "IIINePtunEIII", position: 9, level_id: "450920", requirement: 52, showcase_link: "https://youtu.be/3zJcCyo-HDE" },
      { name: "Back on Track v3 (Web Ver.)", author: "matthew081510", position: 10, level_id: "138338066", requirement: 64, showcase_link: "https://m.youtube.com/watch?v=WJ5XY71qehc" },
      { name: "Closed Door", author: "DingusWingedGuy", position: 11, level_id: "137997482", requirement: 34, showcase_link: "https://www.youtube.com/watch?v=7wKEh1d0JGw" },
      { name: "Starry Night", author: "POUNDGMD", position: 12, level_id: "140402827", requirement: 45, showcase_link: "https://youtu.be/DNKgbOjF0ms" }
    ];

    let currentPage = 0;
    const itemsPerPage = 3;
    let currentTab = 'levels';

    // Search and Filter State
    let filteredLevels = [...levels];
    let searchQuery = "";
    let selectedDifficulty = "all";

    // WBDL State
    let wbdlDemons = [];
    let wbdlCurrentPage = 0;
    const wbdlItemsPerPage = 3;

    // Local Stats system (Favorites & Completed)
    let favorites = JSON.parse(localStorage.getItem('gd_favorites') || '[]');
    let completed = JSON.parse(localStorage.getItem('gd_completed') || '[]');

    // Sync levels with 100% progress into the completed list
    function syncCompletedLevels() {
      try {
        const progressMap = JSON.parse(localStorage.getItem('gd_level_progress') || '{}');
        let completedChanged = false;
        for (const [lvlId, percent] of Object.entries(progressMap)) {
          if (percent === 100 && !completed.includes(lvlId)) {
            completed.push(lvlId);
            completedChanged = true;
          }
        }
        if (completedChanged) {
          localStorage.setItem('gd_completed', JSON.stringify(completed));
        }
      } catch (e) {
        console.error("Error syncing completed levels:", e);
      }
    }
    syncCompletedLevels();

    // Audio system
    const clickSFX = new Audio('game/assets/playSound_01.ogg');
    const bgMusic = new Audio('game/assets/music/-2.mp3');
    bgMusic.loop = true;
    let bgmEnabled = localStorage.getItem('gd_bgm_enabled') === 'true';
    let audioContextStarted = false;

    function playSFX() {
      clickSFX.currentTime = 0;
      clickSFX.play().catch(() => {});
    }

    function toggleMute() {
      playSFX();
      bgmEnabled = !bgmEnabled;
      localStorage.setItem('gd_bgm_enabled', bgmEnabled ? 'true' : 'false');
      updateAudioButton();
      
      if (bgmEnabled) {
        bgMusic.play().catch(() => {});
      } else {
        bgMusic.pause();
      }
    }

    function updateAudioButton() {
      const btn = document.getElementById('audio-btn');
      btn.innerText = bgmEnabled ? '🔊' : '🔇';
    }

    // Favorites & Completed Toggle Logic
    function toggleFavorite(id) {
      playSFX();
      const index = favorites.indexOf(id);
      if (index === -1) {
        favorites.push(id);
      } else {
        favorites.splice(index, 1);
      }
      localStorage.setItem('gd_favorites', JSON.stringify(favorites));
      updateStatsPanel();
      
      if (selectedDifficulty === 'favorites') {
        filterLevels();
      } else {
        renderPage();
      }
    }

    function toggleCompleted(id) {
      playSFX();
      const index = completed.indexOf(id);
      let progressMap = {};
      try {
        progressMap = JSON.parse(localStorage.getItem('gd_level_progress') || '{}');
      } catch (e) {
        console.error("Error loading progress map in toggleCompleted:", e);
      }
      
      if (index === -1) {
        completed.push(id);
        progressMap[id] = 100;
      } else {
        completed.splice(index, 1);
        delete progressMap[id];
      }
      
      try {
        localStorage.setItem('gd_completed', JSON.stringify(completed));
        localStorage.setItem('gd_level_progress', JSON.stringify(progressMap));
      } catch (e) {
        console.error("Error saving updated progress in toggleCompleted:", e);
      }
      
      updateStatsPanel();
      renderPage();
    }

    function updateStatsPanel() {
      document.getElementById('stats-completed').innerText = completed.length;
      document.getElementById('stats-favs').innerText = favorites.length;
      
      // Count completed levels that are demon or extreme difficulty
      let demonCount = 0;
      completed.forEach(id => {
        const lvl = levels.find(l => l.id === id);
        if (lvl && (lvl.diff.toLowerCase() === 'demon' || lvl.diff.toLowerCase() === 'extreme')) {
          demonCount++;
        }
      });
      document.getElementById('stats-demons').innerText = demonCount;
    }

    // Modal Control
    function openCustomLevelModal() {
      const modal = document.getElementById('custom-level-modal');
      modal.classList.add('active');
      const input = document.getElementById('level-id-input');
      input.value = "";
      setTimeout(() => input.focus(), 100);
    }

    function closeCustomLevelModal(e) {
      if (e) playSFX();
      document.getElementById('custom-level-modal').classList.remove('active');
    }

    function handleModalKey(e) {
      if (e.key === 'Enter') {
        submitCustomLevel();
      }
    }

    function submitCustomLevel() {
      const val = document.getElementById('level-id-input').value.trim();
      if (val && !isNaN(val)) {
        closeCustomLevelModal();
        loadLevel(val);
      } else {
        alert("Por favor ingresa un ID numérico válido.");
      }
    }

    // Search & filter levels logic
    function handleSearch(e) {
      searchQuery = e.target.value;
      filterLevels();
    }

    function filterDifficulty(diff, btn) {
      playSFX();
      selectedDifficulty = diff;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      filterLevels();
    }

    function filterLevels() {
      const query = searchQuery.trim().toLowerCase();
      filteredLevels = levels.filter(item => {
        if (item.id === "custom") {
          return query === "" && selectedDifficulty === "all";
        }
        const matchesSearch = item.name.toLowerCase().includes(query) || 
                              item.creator.toLowerCase().includes(query);
        
        let matchesDiff = true;
        if (selectedDifficulty !== "all") {
          if (selectedDifficulty === 'favorites') {
            matchesDiff = favorites.includes(item.id);
          } else if (selectedDifficulty.toLowerCase() === 'demon') {
            matchesDiff = item.diff.toLowerCase() === 'demon' || item.diff.toLowerCase() === 'extreme';
          } else {
            matchesDiff = item.diff.toLowerCase() === selectedDifficulty.toLowerCase();
          }
        }
        return matchesSearch && matchesDiff;
      });
      currentPage = 0;
      renderPage();
    }

    function renderPage() {
      const container = document.getElementById('level-list');
      container.innerHTML = '';
      container.scrollTop = 0; 
      
      const start = currentPage * itemsPerPage;
      const end = start + itemsPerPage;
      const pageItems = filteredLevels.slice(start, end);

      if (pageItems.length === 0) {
        container.innerHTML = '<div class="wbdl-loading" style="color:#aaa;">No se encontraron niveles.</div>';
        updateUI(0);
        return;
      }

      let progressMap = {};
      try {
        progressMap = JSON.parse(localStorage.getItem('gd_level_progress') || '{}');
      } catch (e) {
        console.error("Error loading progress in renderPage:", e);
      }

      pageItems.forEach(item => {
        const row = document.createElement('div');
        row.className = `level-item ${item.style || ''}`;
        
        const isFav = favorites.includes(item.id);
        const isComp = completed.includes(item.id);
        const progress = progressMap[item.id] || 0;

        row.innerHTML = `
          <div class="difficulty-container">
            <img src="${item.face}" class="difficulty-face">
            <span class="difficulty-label">${item.diff}</span>
          </div>
          <div class="level-main-info">
            <p class="level-name">${item.name}</p>
            <span class="level-creator">BY ${item.creator.toUpperCase()}</span>
            ${item.id !== 'custom' ? `
              <div class="level-progress-container">
                <div class="level-progress-bar">
                  <div class="level-progress-fill" style="width: ${progress}%"></div>
                </div>
                <span class="level-progress-text">${progress}%</span>
              </div>
            ` : ''}
          </div>
          
          ${item.id !== 'custom' ? `
            <div class="level-meta-buttons">
              <button class="meta-btn fav-btn ${isFav ? 'active' : ''}" onclick="toggleFavorite('${item.id}')" title="Favorito">❤️</button>
              <button class="meta-btn comp-btn ${isComp ? 'active' : ''}" onclick="toggleCompleted('${item.id}')" title="Marcar completado">🏆</button>
            </div>
          ` : ''}

          <img src="img/Play.webp" 
               class="play-btn" onclick="handleInteraction('${item.id}')">
        `;
        container.appendChild(row);
      });

      updateUI(end);
    }

    function updateUI(endIndex) {
      if (currentTab === 'levels') {
        document.getElementById('page-text').style.display = 'block';
        document.getElementById('page-text').innerText = `PAGE ${currentPage + 1}`;
        document.getElementById('prev-btn').style.display = currentPage === 0 ? 'none' : 'block';
        document.getElementById('next-btn').style.display = (endIndex && endIndex >= filteredLevels.length) ? 'none' : 'block';
      }
    }

    // WBDL Dynamic Loading & Rendering
    async function fetchWbdlDemons() {
      const wbdlContent = document.getElementById('demonlist-content');
      wbdlContent.innerHTML = '<div class="wbdl-loading">Cargando niveles de la Demonlist...</div>';
      
      try {
        const response = await fetch('https://webdemonlist.org/api/demons');
        if (!response.ok) throw new Error('Response error');
        wbdlDemons = await response.json();
      } catch (err) {
        console.warn("No se pudo cargar la Demonlist online. Cargando lista local de respaldo:", err);
        wbdlDemons = fallbackWbdl;
      }
      
      wbdlCurrentPage = 0;
      renderWbdlPage();
    }

    function renderWbdlPage() {
      const container = document.getElementById('demonlist-content');
      container.innerHTML = '';
      container.scrollTop = 0;
      
      const start = wbdlCurrentPage * wbdlItemsPerPage;
      const end = start + wbdlItemsPerPage;
      const pageItems = wbdlDemons.slice(start, end);

      if (pageItems.length === 0) {
        container.innerHTML = '<div class="wbdl-loading">No hay niveles en la Demonlist.</div>';
        updateWbdlUI(0);
        return;
      }

      let progressMap = {};
      try {
        progressMap = JSON.parse(localStorage.getItem('gd_level_progress') || '{}');
      } catch (e) {
        console.error("Error loading progress in renderWbdlPage:", e);
      }

      pageItems.forEach(item => {
        const row = document.createElement('div');
        row.className = `level-item`;
        
        const rank = item.position;
        const face = rank <= 30 ? faces.extremeDemon : faces.easyDemon;
        const diffLabel = rank <= 30 ? "Extreme" : "Demon";
        const points = (250 * Math.exp(-0.0263 * (rank - 1))).toFixed(2);
        const progress = progressMap[item.level_id] || 0;

        row.innerHTML = `
          <span class="demon-rank ${rank <= 3 ? 'top3' : ''}">#${rank}</span>
          <div class="difficulty-container">
            <img src="${face}" class="difficulty-face">
            <span class="difficulty-label">${diffLabel}</span>
          </div>
          <div class="level-main-info">
            <p class="level-name">${item.name}</p>
            <span class="level-creator">BY ${item.author.toUpperCase()} &bull; <span style="color:#00ff44;">${points} PTS</span></span>
            <div class="level-progress-container">
              <div class="level-progress-bar">
                <div class="level-progress-fill" style="width: ${progress}%"></div>
              </div>
              <span class="level-progress-text">${progress}%</span>
            </div>
          </div>
          <div class="demon-actions">
            ${item.showcase_link ? `
              <svg class="showcase-btn" viewBox="0 0 24 24" onclick="playSFX(); window.open('${item.showcase_link}', '_blank')" title="Ver demostración en YouTube">
                <path fill="#FF0000" d="M23.498 6.163a3.003 3.003 0 0 0-2.11-2.11C19.517 3.545 12 3.545 12 3.545s-7.516 0-9.387.507a3.003 3.003 0 0 0-2.11 2.11C0 8.033 0 12 0 12s0 3.967.502 5.837a3.003 3.003 0 0 0 2.11 2.11c1.871.507 9.388.507 9.388.507s7.518 0 9.388-.507a3.003 3.003 0 0 0 2.11-2.11C24 15.967 24 12 24 12s0-3.967-.502-5.837zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
              </svg>
            ` : ''}
            <img src="img/Play.webp" class="play-btn" onclick="handleInteraction('${item.level_id}')" title="Jugar Nivel">
          </div>
        `;
        container.appendChild(row);
      });

      updateWbdlUI(end);
    }

    function updateWbdlUI(endIndex) {
      document.getElementById('page-text').style.display = 'block';
      document.getElementById('page-text').innerText = `PAGE ${wbdlCurrentPage + 1}`;
      document.getElementById('prev-btn').style.display = wbdlCurrentPage === 0 ? 'none' : 'block';
      document.getElementById('next-btn').style.display = (endIndex && endIndex >= wbdlDemons.length) ? 'none' : 'block';
    }

    function openTab(tabName) {
      playSFX();
      currentTab = tabName;
      document.querySelectorAll('.content-viewport').forEach(v => v.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));

      const controls = document.querySelector('.controls-container');

      if (tabName === 'levels') {
        document.getElementById('level-list').classList.add('active');
        document.getElementById('tab-levels').classList.add('active');
        controls.style.visibility = 'visible';
        controls.style.opacity = '1';
        renderPage();
      } else {
        document.getElementById('demonlist-content').classList.add('active');
        document.getElementById('tab-demonlist').classList.add('active');
        controls.style.visibility = 'hidden';
        controls.style.opacity = '0';
        if (wbdlDemons.length === 0) {
          fetchWbdlDemons();
        } else {
          renderWbdlPage();
        }
      }
    }

    function changePage(dir) {
      playSFX();
      if (currentTab === 'levels') {
        currentPage += dir;
        renderPage();
      } else {
        wbdlCurrentPage += dir;
        renderWbdlPage();
      }
    }

    function handleInteraction(id) {
      if (id === 'custom') {
        openCustomLevelModal();
      } else {
        loadLevel(id);
      }
    }

    function loadLevel(id) {
      playSFX();
      window.location.href = `game/index.html?id=${id}`;
    }

    // Page Load Setup
    updateAudioButton();
    updateStatsPanel();
    renderPage();

    // Check protocol warning
    if (window.location.protocol === 'file:') {
      document.getElementById('file-warning-bar').style.display = 'block';
    }

    // Audio context initialization triggers on user click gesture
    document.addEventListener('click', () => {
      if (!audioContextStarted) {
        audioContextStarted = true;
        if (bgmEnabled) {
          bgMusic.play().catch(() => {});
        }
      }
    });

    // Particle Background System
    const canvas = document.getElementById('particle-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    class Particle {
      constructor() {
        this.reset();
        this.y = Math.random() * canvas.height;
      }
      reset() {
        this.size = Math.random() * 25 + 8;
        this.x = Math.random() * canvas.width;
        this.y = canvas.height + this.size;
        this.speed = Math.random() * 1.2 + 0.4;
        this.rotation = Math.random() * Math.PI * 2;
        this.rotSpeed = (Math.random() - 0.5) * 0.015;
        this.opacity = Math.random() * 0.12 + 0.03;
        this.maxOpacity = this.opacity;
      }
      update() {
        this.y -= this.speed;
        this.rotation += this.rotSpeed;
        if (this.y < canvas.height * 0.85) {
          this.opacity = (this.y / (canvas.height * 0.85)) * this.maxOpacity;
        }
        if (this.y + this.size < 0 || this.opacity <= 0) {
          this.reset();
        }
      }
      draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation);
        ctx.strokeStyle = `rgba(255, 255, 255, ${this.opacity})`;
        ctx.lineWidth = 1.5;
        ctx.strokeRect(-this.size/2, -this.size/2, this.size, this.size);
        ctx.restore();
      }
    }

    const particleCount = 25;
    for (let i = 0; i < particleCount; i++) {
      particles.push(new Particle());
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => {
        p.update();
        p.draw();
      });
      requestAnimationFrame(animate);
    }
    animate();
  </script>
</body>
