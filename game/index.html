<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Geometry Dash</title>
    <link rel="icon" href="../favicon.ico" type="image/x-icon">
    <style>
        * { margin: 0; padding: 0; }
        body { overflow: hidden; background: black;}
        canvas { display: block; margin: 0 auto; }
    </style>
  <script>
    var levelId = Number(new URLSearchParams(location.search).get('id'));
    var levelString = new URLSearchParams(location.search).get('string');
    var songID = Number(new URLSearchParams(location.search).get('songID')) || 500476;
    
    function showSWError() {
      const overlay = document.createElement('div');
      overlay.style = "position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); color:white; z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding:20px; box-sizing:border-box;";
      overlay.innerHTML = `
        <h2 style="color:#ff3333; margin-bottom:20px; font-size:28px;">⚠️ Error de Conexión Local</h2>
        <p style="font-size:18px; max-width:600px; line-height:1.6; margin-bottom:20px;">
          Geometry Dash Web requiere un <strong>servidor web local</strong> (HTTP/HTTPS) para funcionar debido a restricciones de seguridad del navegador.
        </p>
        <p style="font-size:16px; color:#aaa; max-width:600px; margin-bottom:30px;">
          No se pueden cargar los archivos del nivel si abres el HTML directamente con doble clic (<code>file://</code>).
        </p>
        <div style="background:#1a1a1a; border:1px solid #444; padding:15px; border-radius:6px; font-family:monospace; text-align:left; font-size:14px; margin-bottom:30px; line-height:1.5;">
          <strong>Cómo solucionarlo:</strong><br>
          1. Abre el proyecto en VS Code y usa la extensión <strong>Live Server</strong>.<br>
          2. O ejecuta en la consola de esta carpeta:<br>
          <span style="color:#ffaa00;">npx http-server</span>
        </div>
        <button onclick="window.location.href='../'" style="background:#ffaa00; border:none; color:black; font-size:16px; padding:12px 30px; border-radius:4px; cursor:pointer; font-weight:bold; text-transform:uppercase; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: transform 0.1s;">Volver al Menú</button>
      `;
      document.body.appendChild(overlay);
    }

    async function start() {
      if (!navigator.serviceWorker || location.protocol === 'file:') {
        showSWError();
        return;
      }

      try {
        await navigator.serviceWorker.register('../worker.js');
        await navigator.serviceWorker.ready;

        // Ensure the service worker controls the page. If not, wait for it or reload (max 3 reloads).
        if (!navigator.serviceWorker.controller) {
          const reloads = Number(sessionStorage.getItem('gd_sw_reloads') || 0);
          if (reloads < 3) {
            sessionStorage.setItem('gd_sw_reloads', reloads + 1);
            navigator.serviceWorker.addEventListener('controllerchange', () => {
              window.location.reload();
            });
            setTimeout(() => {
              window.location.reload();
            }, 600);
            return;
          } else {
            console.warn("Service Worker failed to control the client after multiple reloads. Attempting to run anyway...");
          }
        } else {
          sessionStorage.removeItem('gd_sw_reloads');
        }

        // Send parameters via message as fallback
        if (levelString) {
          navigator.serviceWorker.controller.postMessage({
            levelString: levelString,
            songID: songID
          });
        } else {
          navigator.serviceWorker.controller.postMessage({ levelId });
        }

        const script = document.createElement('script');
        script.type = 'module';
        script.src = './assets/index-game.js';
        document.body.appendChild(script);
      } catch (err) {
        console.error("Failed to register Service Worker:", err);
        showSWError();
      }
    }
    function updateLevelName() {
      if (levelString) {
        window.levelName = "Local Level";
        return;
      }
      const officialLevels = [
          "Stereo Madness",
          "Back on Track",
          "Polargeist",
          "Dry Out",
          "Base After Base",
          "Cant Let Go",
          "Jumper",
          "Time Machine",
          "Cycles",
          "xStep",
          "Clutterfunk",
          "Theory of Everything",
          "Electroman Adventures",
          "Clubstep",
          "Electrodynamix",
          "Hexagon Force",
          "Blast Processing",
          "Theory of Everything 2",
          "Geometrical Dominator",
          "Deadlocked",
          "Fingerdash",
          "Dash",
          "Every End",
          "Ultiate Destruction"
      ];
      if (levelId < 0) {
        const index = Math.abs(levelId) - 1;
        if (officialLevels[index]) {
            window.levelName = officialLevels[index];
        } else {
            window.levelName = "Unknown";
        }
      }
    }
    start();
    setTimeout(updateLevelName, 1000);
  </script>
  <script>
    let fix = false;
    navigator.serviceWorker.addEventListener("message", (event) => {
      if (event.data.type === "invalid-id") {
        if (fix) return;
        fix = true;
        alert("Level doesn't exist... are you sure you typed the ID correctly?");
        window.location.href = "../";
      }
      if (event.data.type === "rate-limit") {
        if (fix) return;
        fix = true;
        alert("Site is currently being rate limited from GD servers, please try again later! (you may still use one of the default levels below)");
        window.location.href = "../";
      }
      if (event.data.type === 'set-level-name') {
        window.levelName = event.data.name;
      }
    });
  </script>
  <script>
    // ResizeObserver catches iframe size changes that window.resize misses
    // (e.g. parent window maximize, snap, title bar drag)
    new ResizeObserver(() => {
      window.dispatchEvent(new Event('resize'));
    }).observe(document.documentElement);
  </script>
</head>
<body>
</body>
</html>
